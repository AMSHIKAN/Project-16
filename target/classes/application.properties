# FreshCart – Application Properties
server.port=8080
spring.application.name=freshcart

# Disable Spring MVC auto-config (we use raw Servlets/JSP)
spring.mvc.view.prefix=/WEB-INF/views/
spring.mvc.view.suffix=.jsp

# Data directory (override with absolute path in production)
app.data.dir=${user.home}/freshcart_data

# Session timeout
server.servlet.session.timeout=30m

# Logging
logging.level.com.yourteam=DEBUG
